name: Deploy to Amazon ECS

# One pipeline per environment branch; each branch deploys to its own AWS account via the OIDC
# role in that account (vars.AWS_DEPLOY_ROLE_ARN, scoped to its GitHub environment).
on:
  push:
    branches: ['main']

env:
  AWS_REGION: ap-south-2 # Hyderabad (India data residency)
  ECR_REPOSITORY: hms # repo name created by the CDK stack
  ECS_SERVICE: hms-backend-service # CDK FargateService (serviceName) — stable across accounts
  ECS_CLUSTER: hms-backend # CDK cluster (clusterName) — stable across accounts

permissions:
  contents: read
  id-token: write # required for OIDC role assumption

jobs:
  deploy:
    name: Deploy
    # ARM64 runner builds the linux/arm64 image natively — no QEMU emulation (faster, and avoids
    # the "qemu: Illegal instruction" crash). Matches the Fargate/Graviton (ARM64) task platform.
    runs-on: ubuntu-24.04-arm
    environment: production # must match the OIDC role's trust `sub` for this branch's account

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build once; push :<sha> (immutable, for traceability/rollback) and :latest (what the
      # CDK task definition references).
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build --platform linux/arm64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --provenance=false \
            --sbom=false \
            --push .

      # CDK owns the task definition; just force a new deployment so ECS re-pulls :latest.
      - name: Roll the ECS service onto the new image
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION"
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"
